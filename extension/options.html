<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: system-ui, "Segoe UI", Arial, sans-serif; max-width: 460px; margin: 30px auto; padding: 0 16px; }
    h1 { font-size: 18px; }
    label { display: block; font-size: 13px; color: #555; margin: 14px 0 4px; }
    input { width: 100%; box-sizing: border-box; padding: 8px; font-size: 14px;
            border: 1px solid #ccc; border-radius: 6px; }
    button { margin-top: 16px; padding: 9px 18px; font-size: 14px; font-weight: 600;
             color: #fff; background: #2563eb; border: 0; border-radius: 6px; cursor: pointer; }
    #status { margin-left: 10px; color: #15803d; font-size: 13px; }
    p.hint { font-size: 12px; color: #777; }
  </style>
</head>
<body>
  <h1>Argus settings</h1>
  <p class="hint">Set these once. The API key must match the backend's <code>API_KEY</code>.</p>
  <label for="backendUrl">Backend URL</label>
  <input id="backendUrl" type="text" placeholder="http://localhost:8000" />
  <label for="apiKey">API key</label>
  <input id="apiKey" type="text" placeholder="(leave blank if the backend has none)" />
  <div><button id="save">Save</button><span id="status"></span></div>
  <script src="options.js"></script>
</body>
</html>
