# Local development stack. Production uses a hosted Postgres (Neon/Supabase free
# tier) so the GitHub-Actions pipeline and the web app share one database.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
